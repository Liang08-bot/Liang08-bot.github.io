<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; font-family: 'JetBrains Mono', monospace;
  }
  .game-container { text-align: center; }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; padding: 0 4px;
  }
  .score {
    color: #00e5a0; font-size: 1.1rem; font-weight: 700;
    letter-spacing: 2px;
  }
  .high-score {
    color: #6b6b7b; font-size: 0.85rem;
  }
  canvas {
    border: 1px solid #1e1e2a; border-radius: 8px;
    background: #0d0d14; display: block;
  }
  .controls {
    margin-top: 16px; color: #6b6b7b; font-size: 0.8rem;
  }
  .controls span { color: #00e5a0; }
  .game-over {
    display: none; color: #ff6b6b; font-size: 1.2rem;
    margin-top: 12px; font-weight: 700;
  }
  .restart-btn {
    margin-top: 10px; padding: 8px 24px;
    background: #00e5a0; color: #0a0a0f;
    border: none; border-radius: 6px; font-size: 0.9rem;
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    cursor: pointer; transition: box-shadow 0.2s;
  }
  .restart-btn:hover { box-shadow: 0 0 20px rgba(0,229,160,0.3); }
</style>
</head>
<body>

<div class="game-container">
  <div class="header">
    <div class="score">SCORE: <span id="score">0</span></div>
    <div class="high-score">BEST: <span id="high">0</span></div>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="game-over" id="gameOver">GAME OVER</div>
  <button class="restart-btn" id="restartBtn" style="display:none">重新开始</button>
  <p class="controls">
    <span>↑ ↓ ← →</span> 或 <span>W A S D</span> 控制方向
  </p>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highEl = document.getElementById('high');
const gameOverEl = document.getElementById('gameOver');
const restartBtn = document.getElementById('restartBtn');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake = [{x: 5, y: 5}, {x: 4, y: 5}, {x: 3, y: 5}];
let dir = {x: 1, y: 0};
let food = randomFood();
let score = 0;
let highScore = localStorage.getItem('snakeHigh') || 0;
let running = true;
let speed = 100;

highEl.textContent = highScore;

function randomFood() {
  while (true) {
    const f = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
    if (!snake.some(s => s.x === f.x && s.y === f.y)) return f;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // grid lines
  ctx.strokeStyle = 'rgba(30,30,42,0.3)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i * GRID, 0); ctx.lineTo(i * GRID, canvas.height); ctx.stroke();
  }
  for (let i = 0; i < ROWS; i++) {
    ctx.beginPath(); ctx.moveTo(0, i * GRID); ctx.lineTo(canvas.width, i * GRID); ctx.stroke();
  }

  // snake
  snake.forEach((s, i) => {
    const alpha = 1 - i * 0.03;
    ctx.fillStyle = `rgba(0,229,160,${alpha})`;
    ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
  });

  // head
  ctx.fillStyle = '#00e5a0';
  ctx.fillRect(snake[0].x * GRID + 2, snake[0].y * GRID + 2, GRID - 4, GRID - 4);

  // food
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath();
  ctx.arc(
    food.x * GRID + GRID / 2, food.y * GRID + GRID / 2,
    GRID / 2 - 2, 0, Math.PI * 2
  );
  ctx.fill();
}

function update() {
  if (!running) return;

  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return gameOver();
  }

  // self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    food = randomFood();
    if (speed > 40) speed -= 2;
  } else {
    snake.pop();
  }

  draw();
}

function gameOver() {
  running = false;
  gameOverEl.style.display = 'block';
  restartBtn.style.display = 'inline-block';
  if (score > highScore) {
    highScore = score;
    highEl.textContent = highScore;
    localStorage.setItem('snakeHigh', highScore);
  }
}

function restart() {
  snake = [{x: 5, y: 5}, {x: 4, y: 5}, {x: 3, y: 5}];
  dir = {x: 1, y: 0};
  food = randomFood();
  score = 0;
  speed = 100;
  running = true;
  scoreEl.textContent = '0';
  gameOverEl.style.display = 'none';
  restartBtn.style.display = 'none';
  draw();
}

document.addEventListener('keydown', e => {
  if (!running) return;
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W':
      if (dir.y === 0) dir = {x: 0, y: -1}; break;
    case 'ArrowDown': case 's': case 'S':
      if (dir.y === 0) dir = {x: 0, y: 1}; break;
    case 'ArrowLeft': case 'a': case 'A':
      if (dir.x === 0) dir = {x: -1, y: 0}; break;
    case 'ArrowRight': case 'd': case 'D':
      if (dir.x === 0) dir = {x: 1, y: 0}; break;
  }
});

restartBtn.addEventListener('click', restart);

draw();
setInterval(update, speed);
</script>

</body>
</html>
