<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VoxelCraft</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;user-select:none}
canvas{display:block}
#info{position:fixed;top:10px;left:10px;color:rgba(255,255,255,.7);font:13px monospace;pointer-events:none;z-index:10}
#fps{position:fixed;top:10px;right:10px;color:rgba(255,255,255,.5);font:12px monospace;z-index:10}
#controls{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10}
#controls button{width:55px;height:55px;border:1px solid rgba(255,255,255,.25);border-radius:12px;background:rgba(0,0,0,.55);color:#fff;font-size:22px;cursor:pointer;touch-action:manipulation}
#controls button:active{background:rgba(255,255,255,.15)}
.dpad{display:grid;grid-template-rows:55px 55px 55px;grid-template-columns:55px 55px 55px;gap:5px}
.dpad .up{grid-column:2;grid-row:1}
.dpad .left{grid-column:1;grid-row:2}
.dpad .center{grid-column:2;grid-row:2;font-size:14px}
.dpad .right{grid-column:3;grid-row:2}
.dpad .down{grid-column:2;grid-row:3}
#jump{height:55px;width:55px;font-size:14px}
</style>
</head>
<body>
<div id="info">VoxelCraft — Drag to look · WASD / Arrows move</div>
<div id="fps"></div>
<div id="controls">
  <div class="dpad">
    <button class="up" id="bu">▲</button>
    <button class="left" id="bl">◀</button>
    <button class="center" id="bc">↺</button>
    <button class="right" id="br">▶</button>
    <button class="down" id="bd">▼</button>
  </div>
  <button id="jump">⬆</button>
</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

/* ═══════════════ Procedural Texture Atlas ═══════════════ */
const ATLAS = 256, CELL = 16, COLS = ATLAS / CELL;
const texCanvas = document.createElement('canvas');
texCanvas.width = texCanvas.height = ATLAS;
const tctx = texCanvas.getContext('2d');

function fillCell(col, row, cb) {
  let x = col * CELL, y = row * CELL;
  tctx.save();
  tctx.beginPath();
  tctx.rect(x, y, CELL, CELL);
  tctx.clip();
  cb(tctx, x, y);
  tctx.restore();
}
function noisePixel(r, g, b, range) {
  let rr = r + Math.floor(Math.random() * range * 2 - range);
  let gg = g + Math.floor(Math.random() * range * 2 - range);
  let bb = b + Math.floor(Math.random() * range * 2 - range);
  return `rgb(${Math.max(0,Math.min(255,rr))},${Math.max(0,Math.min(255,gg))},${Math.max(0,Math.min(255,bb))})`;
}

// Grass top (col 0, row 0)
fillCell(0, 0, (ctx, x, y) => {
  ctx.fillStyle = '#7ec850';
  ctx.fillRect(x, y, CELL, CELL);
  for (let i = 0; i < 60; i++) {
    let px = x + Math.random() * CELL, py = y + Math.random() * CELL;
    ctx.fillStyle = noisePixel(90, 210, 30, 20);
    ctx.fillRect(px, py, 2, 2);
  }
});

// Grass side (col 1, row 0) — green top edge
fillCell(1, 0, (ctx, x, y) => {
  ctx.fillStyle = '#8b6914';
  ctx.fillRect(x, y, CELL, CELL);
  for (let py = 0; py < CELL; py++) {
    for (let px = 0; px < CELL; px++) {
      ctx.fillStyle = noisePixel(139, 105, 20, 8);
      ctx.fillRect(x + px, y + py, 1, 1);
    }
  }
  for (let px = 0; px < CELL; px++) {
    ctx.fillStyle = noisePixel(80, 180, 40, 12);
    ctx.fillRect(x + px, y, 1, 3);
    ctx.fillRect(x + px, y + 1, 1, 1);
  }
});

// Dirt (col 0, row 1)
fillCell(0, 1, (ctx, x, y) => {
  ctx.fillStyle = '#8b6914';
  ctx.fillRect(x, y, CELL, CELL);
  for (let py = 0; py < CELL; py++) {
    for (let px = 0; px < CELL; px++) {
      ctx.fillStyle = noisePixel(139, 105, 20, 10);
      ctx.fillRect(x + px, y + py, 1, 1);
    }
  }
});

// Stone (col 0, row 2)
fillCell(0, 2, (ctx, x, y) => {
  ctx.fillStyle = '#7a7a7a';
  ctx.fillRect(x, y, CELL, CELL);
  for (let py = 0; py < CELL; py++) {
    for (let px = 0; px < CELL; px++) {
      ctx.fillStyle = noisePixel(122, 122, 122, 18);
      ctx.fillRect(x + px, y + py, 1, 1);
    }
  }
  // Cracks
  for (let i = 0; i < 8; i++) {
    ctx.fillStyle = 'rgba(60,60,60,0.15)';
    ctx.fillRect(x + Math.random() * CELL, y + Math.random() * CELL, Math.random() * 6 + 1, 1);
  }
});

// Sand (col 1, row 2)
fillCell(1, 2, (ctx, x, y) => {
  ctx.fillStyle = '#ddcc88';
  ctx.fillRect(x, y, CELL, CELL);
  for (let py = 0; py < CELL; py++) {
    for (let px = 0; px < CELL; px++) {
      ctx.fillStyle = noisePixel(221, 204, 136, 10);
      ctx.fillRect(x + px, y + py, 1, 1);
    }
  }
});

// Water (col 2, row 0) — blue semi
fillCell(2, 0, (ctx, x, y) => {
  ctx.fillStyle = '#3355cc';
  ctx.fillRect(x, y, CELL, CELL);
  for (let py = 0; py < CELL; py++) {
    for (let px = 0; px < CELL; px++) {
      ctx.fillStyle = noisePixel(40, 70, 190, 15);
      ctx.fillRect(x + px, y + py, 1, 1);
    }
  }
});

// Snow (col 3, row 0)
fillCell(3, 0, (ctx, x, y) => {
  ctx.fillStyle = '#eeeedd';
  ctx.fillRect(x, y, CELL, CELL);
  for (let py = 0; py < CELL; py++) {
    for (let px = 0; px < CELL; px++) {
      ctx.fillStyle = noisePixel(238, 238, 221, 6);
      ctx.fillRect(x + px, y + py, 1, 1);
    }
  }
});

// Wood/Tree (col 0, row 3)
fillCell(0, 3, (ctx, x, y) => {
  ctx.fillStyle = '#a0714a';
  ctx.fillRect(x, y, CELL, CELL);
  for (let py = 0; py < CELL; py++) {
    for (let px = 0; px < CELL; px++) {
      let v = (py % 4) < 1 ? 10 : 0;
      ctx.fillStyle = noisePixel(160, 113, 74, 14 + v);
      ctx.fillRect(x + px, y + py, 1, 1);
    }
  }
});

// Leaves (col 1, row 3)
fillCell(1, 3, (ctx, x, y) => {
  ctx.fillStyle = '#3d7020';
  ctx.fillRect(x, y, CELL, CELL);
  for (let py = 0; py < CELL; py++) {
    for (let px = 0; px < CELL; px++) {
      ctx.fillStyle = noisePixel(61, 112, 32, 18);
      ctx.fillRect(x + px, y + py, 1, 1);
    }
  }
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(x + Math.random() * CELL, y + Math.random() * CELL, 2, 2);
  }
});

const atlasTex = new THREE.CanvasTexture(texCanvas);
atlasTex.magFilter = THREE.NearestFilter;
atlasTex.minFilter = THREE.NearestMipmapNearestFilter;
atlasTex.generateMipmaps = true;
atlasTex.colorSpace = THREE.SRGBColorSpace;

/* ═══════════════ Block Types ═══════════════ */
const BLOCK = { AIR:0, GRASS:1, DIRT:2, STONE:3, SAND:4, SNOW:5, WATER:6, WOOD:7, LEAVES:8 };
// Texture UV mapping: [top(tx,ty), side(sx,sy), bottom(bx,by)]
// Each: (atlas_col, atlas_row)
const BLOCK_UV = {
  [BLOCK.GRASS]:  [[0,0],[1,0],[0,1]],  // top=sprite0, side=sprite1(grass_side), bottom=dirt
  [BLOCK.DIRT]:   [[0,1],[0,1],[0,1]],
  [BLOCK.STONE]:  [[0,2],[0,2],[0,2]],
  [BLOCK.SAND]:   [[1,2],[1,2],[1,2]],
  [BLOCK.SNOW]:   [[3,0],[3,0],[3,0]],
  [BLOCK.WATER]:  [[2,0],[2,0],[2,0]],
  [BLOCK.WOOD]:   [[0,3],[0,3],[0,3]],
  [BLOCK.LEAVES]: [[1,3],[1,3],[1,3]],
};

function uvFor(block, face) {
  let mapping = BLOCK_UV[block] || [[0,2],[0,2],[0,2]];
  let [col, row] = (face === 0) ? mapping[0] : (face === 1) ? mapping[2] : mapping[1];
  let u0 = col / COLS, v0 = 1 - (row + 1) / COLS;
  let u1 = (col + 1) / COLS, v1 = 1 - row / COLS;
  return { u0, v0, u1, v1 };
}

/* ═══════════════ Noise ═══════════════ */
function seeded(x, z, seed = 42) {
  let a = x * 374761393 + z * 668265263 + seed;
  a = (a ^ a >> 16) * 0x85ebca6b;
  a = (a ^ a >> 13) & 0x7fffffff;
  return (a % 1000000) / 1000000;
}
function smoothNoise(x, z, s) {
  let ix = Math.floor(x), iz = Math.floor(z);
  let fx = x - ix, fz = z - iz;
  fx = fx * fx * (3 - 2 * fx);
  fz = fz * fz * (3 - 2 * fz);
  return seeded(ix, iz, s) * (1 - fx) * (1 - fz) +
         seeded(ix + 1, iz, s) * fx * (1 - fz) +
         seeded(ix, iz + 1, s) * (1 - fx) * fz +
         seeded(ix + 1, iz + 1, s) * fx * fz;
}
function terrainH(wx, wz) {
  let h = 0, amp = 8, freq = 0.005, max = 0;
  for (let i = 0; i < 5; i++) {
    h += (smoothNoise(wx * freq, wz * freq, i * 13) * 2 - 1) * amp;
    max += amp;
    amp *= 0.5;
    freq *= 2.2;
  }
  return Math.floor(h / max * 6 + 9);
}

/* ═══════════════ Chunk ═══════════════ */
const CS = 16, CH = 64;
class Chunk {
  constructor(cx, cz) {
    this.cx = cx; this.cz = cz;
    this.data = new Uint8Array(CS * CH * CS);
    this.mesh = null;
    this._generate();
  }
  _generate() {
    let buf = this.data;
    for (let gx = 0; gx < CS; gx++) {
      for (let gz = 0; gz < CS; gz++) {
        let wx = this.cx * CS + gx, wz = this.cz * CS + gz;
        let h = terrainH(wx, wz);
        for (let y = 0; y < h && y < CH; y++) {
          let i = gx * CH * CS + y * CS + gz;
          if (y === h - 1) buf[i] = (h > 13) ? BLOCK.SNOW : (h > 8) ? BLOCK.GRASS : BLOCK.SAND;
          else if (y > h - 5) buf[i] = BLOCK.DIRT;
          else buf[i] = BLOCK.STONE;
        }
      }
    }
  }
  at(x, y, z) {
    if (x < 0 || x >= CS || z < 0 || z >= CS || y < 0 || y >= CH) return 0;
    return this.data[x * CH * CS + y * CS + z];
  }
  buildMesh() {
    let verts = [], uvs = [], idx = [], vi = 0;
    let add = (x, y, z, face) => {
      let block = this.at(x, y, z);
      let { u0, v0, u1, v1 } = uvFor(block, face);
      let wx = this.cx * CS + x, wy = y, wz = this.cz * CS + z;
      let shade = (face === 0) ? 1.0 : (face === 1) ? 0.5 : 0.65;
      let r = shade, g = shade, b = shade;
      // Slightly blue-tint grass sides
      if (block === BLOCK.GRASS && face >= 2) { r *= 0.95; g *= 1.0; b *= 0.9; }

      if (face === 0) { // top
        verts.push(wx, wy + 1, wz + 1, wx, wy + 1, wz, wx + 1, wy + 1, wz, wx + 1, wy + 1, wz + 1);
      } else if (face === 1) { // bottom
        verts.push(wx, wy, wz, wx, wy, wz + 1, wx + 1, wy, wz + 1, wx + 1, wy, wz);
      } else if (face === 2) { // front (+z)
        verts.push(wx, wy, wz + 1, wx + 1, wy, wz + 1, wx + 1, wy + 1, wz + 1, wx, wy + 1, wz + 1);
      } else if (face === 3) { // back (-z)
        verts.push(wx + 1, wy, wz, wx, wy, wz, wx, wy + 1, wz, wx + 1, wy + 1, wz);
      } else if (face === 4) { // right (+x)
        verts.push(wx + 1, wy, wz + 1, wx + 1, wy, wz, wx + 1, wy + 1, wz, wx + 1, wy + 1, wz + 1);
      } else { // left (-x)
        verts.push(wx, wy, wz, wx, wy, wz + 1, wx, wy + 1, wz + 1, wx, wy + 1, wz);
      }
      uvs.push(u0, v0, u0, v1, u1, v1, u1, v0);
      for (let k = 0; k < 4; k++) verts.push(r, g, b);
      idx.push(vi, vi + 1, vi + 2, vi, vi + 2, vi + 3);
      vi += 4;
    };

    for (let x = 0; x < CS; x++)
    for (let z = 0; z < CS; z++)
    for (let y = 0; y < CH; y++) {
      let b = this.at(x, y, z);
      if (!b) continue;
      if (!this.at(x, y + 1, z)) add(x, y, z, 0);
      if (!this.at(x, y - 1, z)) add(x, y, z, 1);
      if (!this.at(x, y, z + 1)) add(x, y, z, 2);
      if (!this.at(x, y, z - 1)) add(x, y, z, 3);
      if (!this.at(x + 1, y, z)) add(x, y, z, 4);
      if (!this.at(x - 1, y, z)) add(x, y, z, 5);
    }

    if (!vi) return;
    // Merge positions + colors into one interleaved buffer
    let posArr = [], colArr = [];
    for (let i = 0; i < verts.length; i += 6) {
      posArr.push(verts[i], verts[i + 1], verts[i + 2]);
      colArr.push(verts[i + 3], verts[i + 4], verts[i + 5]);
    }
    let geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(posArr), 3));
    geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colArr), 3));
    geo.setAttribute('uv', new THREE.BufferAttribute(new Float32Array(uvs), 2));
    geo.setIndex(idx);
    geo.computeVertexNormals();
    let mat = new THREE.MeshStandardMaterial({
      map: atlasTex,
      vertexColors: true,
      roughness: 0.9,
      metalness: 0,
      side: THREE.FrontSide
    });
    this.mesh = new THREE.Mesh(geo, mat);
    return this.mesh;
  }
}

/* ═══════════════ Scene ═══════════════ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8ab4f8);
scene.fog = new THREE.Fog(0x8ab4f8, 50, 150);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.5, 200);
camera.position.set(24, 25, 24);

const ambient = new THREE.AmbientLight(0x8899cc, 0.5);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffeedd, 2.5);
sun.position.set(40, 60, 20);
scene.add(sun);
const hemi = new THREE.HemisphereLight(0x87ceeb, 0x336633, 0.4);
scene.add(hemi);

// Ground
let groundGeo = new THREE.PlaneGeometry(400, 400);
let groundMat = new THREE.MeshStandardMaterial({ color: 0x559944, roughness: 1 });
let ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
scene.add(ground);

/* ═══════════════ World ═══════════════ */
const chunks = new Map();
const R = 3;
for (let cx = -R; cx <= R; cx++)
for (let cz = -R; cz <= R; cz++) {
  let c = new Chunk(cx, cz);
  let m = c.buildMesh();
  if (m) scene.add(m);
  chunks.set(`${cx},${cz}`, c);
}

/* ═══════════════ Player ═══════════════ */
const player = { x: CS * 0.5, y: 20, z: CS * 0.5, pitch: -10, yaw: 0, speed: 8 };
let keys = {};
let btn = { up: 0, down: 0, left: 0, right: 0, jump: 0 };
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Mouse
let mouseDown = false;
renderer.domElement.addEventListener('pointerdown', () => mouseDown = true);
window.addEventListener('pointerup', () => mouseDown = false);
renderer.domElement.addEventListener('pointermove', e => {
  if (!mouseDown) return;
  player.yaw -= e.movementX * 0.2;
  player.pitch -= e.movementY * 0.15;
  player.pitch = Math.max(-90, Math.min(90, player.pitch));
});

// Touch look
renderer.domElement.addEventListener('touchstart', e => {
  if (e.target.tagName === 'BUTTON') return;
  e._sx = e.touches[0].clientX; e._sy = e.touches[0].clientY;
});
renderer.domElement.addEventListener('touchmove', e => {
  if (e.target.tagName === 'BUTTON' || !e.touches[0]) return;
  player.yaw -= (e.touches[0].clientX - e._sx) * 0.15;
  player.pitch -= (e.touches[0].clientY - e._sy) * 0.12;
  player.pitch = Math.max(-90, Math.min(90, player.pitch));
  e._sx = e.touches[0].clientX; e._sy = e.touches[0].clientY;
});

// D-pad
['bu','bd','bl','br','jump'].forEach(id => {
  let el = document.getElementById(id);
  el.addEventListener('pointerdown', () => btn[id] = 1);
  el.addEventListener('pointerup', () => btn[id] = 0);
  el.addEventListener('pointerleave', () => btn[id] = 0);
});

/* ═══════════════ Loop ═══════════════ */
let lastTime = performance.now(), frames = 0, fps = 0;
function animate(t) {
  requestAnimationFrame(animate);
  let dt = Math.min((t - lastTime) / 1000, 0.1);
  lastTime = t; frames++;

  // Movement
  let fwd = (keys['w'] || keys['arrowup']) ? 1 : btn['bu'];
  let bck = (keys['s'] || keys['arrowdown']) ? 1 : btn['bd'];
  let lft = (keys['a'] || keys['arrowleft']) ? 1 : btn['bl'];
  let rgt = (keys['d'] || keys['arrowright']) ? 1 : btn['br'];
  let up = (keys[' '] || btn['jump']) ? 1 : 0;

  if (fwd || bck || lft || rgt) {
    let yr = player.yaw * Math.PI / 180;
    let s = Math.sin(yr), c = Math.cos(yr);
    let mx = (fwd - bck) * s + (lft - rgt) * c;
    let mz = (fwd - bck) * c - (lft - rgt) * s;
    let len = Math.sqrt(mx * mx + mz * mz) || 1;
    player.x += (mx / len) * player.speed * dt;
    player.z += (mz / len) * player.speed * dt;
  }
  if (up) player.y += 5 * dt;

  // Camera
  let yr = player.yaw * Math.PI / 180;
  let pr = player.pitch * Math.PI / 180;
  camera.position.set(player.x, player.y + 1.6, player.z);
  camera.lookAt(
    player.x + Math.sin(yr) * Math.cos(pr),
    player.y + 1.6 + Math.sin(pr),
    player.z + Math.cos(yr) * Math.cos(pr)
  );

  renderer.render(scene, camera);
}

// FPS
setInterval(() => { fps = frames; frames = 0; document.getElementById('fps').textContent = `FPS ${fps}`; }, 1000);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

requestAnimationFrame(animate);
console.log(`VoxelCraft ready — ${chunks.size} chunks generated`);
</script>
</body>
</html>
